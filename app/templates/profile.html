<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../static/css/nav-bar.css" />
    <link rel="stylesheet" href="../static/css/profile-style.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

    <title> Profile Section</title>

</head>

<body>
    
<nav class="nav-container">
    <div class="nav-left">
        <img src="../static/images/trackr-logo.png" alt="logo" id="trackr-logo">
    </div>

    <ul class="nav-menu">
        <li>Start Tracking <i class="ph ph-caret-down"></i></li>
        <li>Upload Track <i class="ph ph-caret-down"></i></li>
        <li>Browse Track <i class="ph ph-caret-down"></i></li>
    </ul>

    <div class="nav-right">
        <form class="search-container">
            <div class="search-box">
                <i class="ph ph-list-magnifying-glass"></i>
                <input type="text" id="search-track" placeholder="Search Track">
            </div>
        </form> 
            
        <div class="auth-icon-container">
            <div class="auth-buttons">
                <a href="/login" class="login-link">Login</a>
                <button onclick="window.location.href='{{ url_for('signup_page') }}'" class="signup-btn">Sign Up</button>
            </div>

            <div class="nav-icons">
                <i class="ph ph-download-simple"></i>
                <i class="ph ph-seal-question"></i>
                <i class="ph ph-globe-simple"></i>
            </div>
         </div>

    </div>
</nav>


<!-- HERO SECTION OF PROFILE -->

<div class="banner-container" onclick="document.getElementById('bgFileInput').click()">
    <div class="profile-banner" id="profileBanner">
        <div class="banner-hover-overlay" id="bannerOverlay">
            <span>Change Background</span>
        </div>
      <input type="file" id="bgFileInput" accept="image/*" style="display:none"/>
    </div>
</div>

<main>

<div class="pfp-container" onclick="document.getElementById('pfpFileInput').click()">

    <img id="profileImage"  src="../static/images/default-pfp.png" alt="pfp-image">

    <input type="file" id="pfpFileInput" accept="image/*" hidden>

    <div class="pfp-overlay">
        <span>Change PFP</span>
    </div>

</div>

    <div class="profile-info">

        <div class="username-label">Username</div>
        <div class="username-text" id="displayUsername">Javaswingx</div>

        <div class="profile-btns">
          <button class="btn-yellow" id="editProfileBtn">
            Edit Profile
            <i class="ph ph-note-pencil"></i>
          </button>

          <button class="btn-yellow">
            Public Profile
            <i class="ph ph-eye"></i>
          </button>
    </div>

      <div class="name-row">
                <div class="name-group">
                  <span class="name-label">Firstname</span>
                  <span class="name-value" id="displayFirstname"> None </span>
                </div>

                <div class="name-divider"></div>

                <div class="name-group">
                  <span class="name-label">Surname</span>
                  <span class="name-value" id="displaySurname"> None </span>
                </div>
              </div>
            </div>
            
          </div>

          <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">Followers</div>
                <div class="stat-icon-row">
                    <i class="ph ph-users"></i>
            </div>

            <div class="stat-value">0</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">Following</div>
                <div class="stat-icon-row">
                 <i class="ph ph-user"></i>
                </div>
                <div class="stat-value">0</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">Total Tracks</div>
                <div class="stat-icon-row">
                  <i class="ph ph-hand-eye"></i>
                </div>
                <div class="stat-value">0</div>
              </div>
            </div>


            </div>



</main>

          <div class="bd-container">
     
            <div class="cards">
              <div class="title"> Dashboard </div>
                <div class="db-container">
                  <h1> COMING SOON! </h1>
                  <p> Dashboard Analytics are on their way </p>
                </div>
            </div>

            <div class="cards">
              <div class="title"> Top Tracks </div>
                <div class="track-container">
                  <button> Add Favorite Track
                    <i class="ph ph-plus"></i>
                  </button>
                </div>
            </div>

          </div>


          <div class="last-shit-buttons">
              <button class="delete">
                Delete Account
              </button>

                <button class="logout">
                  Logout
                </button>
          </div>

  
</body>

</html>
